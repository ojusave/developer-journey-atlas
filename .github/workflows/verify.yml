name: Verify

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  node:
    name: Node 22 and data integrity
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out complete history
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Use Node 22.22.0
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.22.0
          cache: npm
          cache-dependency-path: |
            package-lock.json
            workflows/package-lock.json
            packages/journey-corpus/package-lock.json

      - name: Install locked dependencies
        run: |
          npm ci
          npm --prefix workflows ci
          npm --prefix packages/journey-corpus ci

      - name: Run tests and Atlas integrity checks
        run: npm run test:all

      - name: Type-check and build scanner
        run: |
          npm run typecheck
          npm run build

      - name: Type-check and build Workflow
        run: |
          npm --prefix workflows run typecheck
          npm --prefix workflows run build

      - name: Verify deterministic journey outputs
        run: npm run journey:check

      - name: Reject high or critical dependency advisories
        run: npm audit --audit-level=high

  secrets:
    name: Full-history secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out complete history
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install verified Gitleaks 8.30.1
        run: |
          curl -fsSL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz -o gitleaks.tar.gz
          echo "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  gitleaks.tar.gz" | sha256sum --check
          tar -xzf gitleaks.tar.gz gitleaks

      - name: Scan all Git history
        run: ./gitleaks git --redact=100 --log-opts="--all" --no-banner --no-color .
