<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Developer Journey Atlas</title>
    <meta
      name="description"
      content="Search a developer platform and inspect its documented route from account creation to first success."
    />
    <link rel="icon" href="https://render.com/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Schibsted+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>

    <header class="site-header">
      <a class="brand brand-compact" href="/" aria-label="Developer Journey Atlas home">
        <span class="brand-mark" aria-hidden="true">DJ</span>
        <span class="brand-text">Developer Journey Atlas</span>
      </a>
      <div class="header-actions">
        <a
          class="btn btn-primary"
          href="https://render.com/deploy?repo=https://github.com/ojusave/developer-journey-atlas"
          >Deploy to Render</a
        >
      </div>
    </header>

    <main id="main">
      <section class="hero" aria-labelledby="brand-title">
        <div class="hero-atmosphere" aria-hidden="true"></div>
        <p class="brand-display" id="brand-title">Developer Journey Atlas</p>
        <p class="hero-line">Documented routes from account creation to first developer success.</p>

        <form id="search-form" class="search" role="search" autocomplete="off">
          <label class="visually-hidden" for="search">Platform or company name</label>
          <input
            id="search"
            type="search"
            placeholder="Render, Stripe, Supabase…"
            aria-describedby="search-hint"
            aria-expanded="false"
            aria-controls="suggestions"
            role="combobox"
          />
          <button type="submit" class="btn btn-primary">Show journey</button>
          <ul id="suggestions" class="suggestions" role="listbox" hidden></ul>
        </form>

        <p id="search-hint" class="search-hint">
          <span id="platform-count">224</span> platforms · paths labeled by audit status
        </p>
      </section>

      <section id="result" class="result-panel" aria-live="polite" hidden></section>
    </main>

    <footer class="site-footer">
      <nav class="footer-links" aria-label="Site">
        <a href="https://github.com/ojusave/developer-journey-atlas">GitHub</a>
        <a href="https://render.com/docs/workflows">Workflows docs</a>
        <a href="/methodology.md">Method</a>
        <a href="/llms.txt">LLM guide</a>
        <a href="/data/index.json">Data</a>
        <a href="/measurement-contract.md">Measurement</a>
      </nav>
    </footer>

    <script src="app.js" defer></script>
  </body>
</html>
