services:
  - type: web
    name: developer-journey-atlas
    runtime: node
    plan: free
    region: oregon
    rootDir: packages/journey-corpus
    buildCommand: npm ci --include=dev && npm run build:data && npm run build:app
    startCommand: npm start
    healthCheckPath: /healthz
    autoDeployTrigger: checksPass
    envVars:
      - key: NODE_ENV
        value: production
      - key: RESEARCH_ENABLED
        value: "false"
      - key: OPENROUTER_MODEL
        value: openai/gpt-4.1-mini
      # Optional live-research secrets. Add these in the Render Dashboard, then
      # set RESEARCH_ENABLED=true. They are intentionally not committed.
      # - key: YDC_API_KEY
      #   sync: false
      # - key: OPENROUTER_API_KEY
      #   sync: false
      # - key: GITHUB_TOKEN
      #   sync: false
