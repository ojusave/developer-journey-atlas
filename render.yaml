services:
  - type: web
    name: developer-journey-atlas
    runtime: node
    plan: free
    region: oregon
    rootDir: packages/journey-corpus
    buildCommand: npm ci --include=dev && npm run build:data && npm run build:app
    startCommand: npm start
    healthCheckPath: /healthz
    autoDeployTrigger: checksPass
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22.22.0
      - key: OPENROUTER_MODEL
        value: openai/gpt-4.1-mini
      # Live-research secrets are set in Render, never committed.
      - key: YDC_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
